services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskhive
      POSTGRES_PASSWORD: taskhive
      POSTGRES_DB: taskhive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskhive"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://taskhive:taskhive@postgres:5432/taskhive
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
